services:
  web:
    build: .
    container_name: salam_offer_web
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DJANGO_DEBUG: "${DJANGO_DEBUG:-1}"
      DJANGO_SECRET_KEY: "${DJANGO_SECRET_KEY:-change-me-for-hosting}"
      DJANGO_ALLOWED_HOSTS: "${DJANGO_ALLOWED_HOSTS:-127.0.0.1,localhost}"
      SQLITE_PATH: "${SQLITE_PATH:-/app/data/db.sqlite3}"
    volumes:
      - salam_offer_data:/app/data
      - salam_offer_static:/app/staticfiles

volumes:
  salam_offer_data:
  salam_offer_static:
