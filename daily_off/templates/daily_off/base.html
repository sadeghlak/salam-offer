{% load jalali %}
<!doctype html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Salam Offer{% endblock %}</title>
    <style>
        @import url("https://cdn.jsdelivr.net/npm/vazirmatn@33.0.3/Vazirmatn-font-face.css");

        :root {
            --bg: #f7f7f8;
            --surface: #ffffff;
            --surface-soft: #f9fafb;
            --text: #111827;
            --muted: #6b7280;
            --muted-soft: #9ca3af;
            --line: #e5e7eb;
            --line-strong: #d1d5db;
            --primary: #e9531d;
            --primary-dark: #c74214;
            --primary-soft: #fff1e9;
            --danger: #dc2626;
            --danger-soft: #fef2f2;
            --warning: #b45309;
            --warning-soft: #fffbeb;
            --success: #15803d;
            --success-soft: #f0fdf4;
            --info: #2563eb;
            --info-soft: #eff6ff;
            --radius: 10px;
        }
        * { box-sizing: border-box; }
        html, body { min-height: 100%; }
        body {
            margin: 0;
            color: var(--text);
            background: var(--bg);
            font-family: Vazirmatn, Tahoma, Arial, sans-serif;
            font-size: 13px;
        }
        a { color: inherit; text-decoration: none; }
        button, input, select { font-family: inherit; }

        .ops-shell {
            min-height: 100vh;
            display: grid;
            grid-template-columns: 176px minmax(0, 1fr);
            background: var(--bg);
        }
        .ops-sidebar {
            position: sticky;
            top: 0;
            height: 100vh;
            padding: 16px 12px;
            background: var(--surface);
            border-left: 1px solid var(--line);
        }
        .ops-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 4px 6px 16px;
            margin-bottom: 10px;
            color: var(--text);
        }
        .ops-brand-mark {
            width: 30px;
            height: 30px;
            display: grid;
            place-items: center;
            border-radius: 9px;
            background: var(--primary);
            color: #fff;
            font-weight: 950;
            font-size: 15px;
        }
        .ops-brand-title { direction: ltr; font-weight: 900; letter-spacing: -.2px; }
        .ops-nav { display: grid; gap: 4px; }
        .ops-nav-link {
            display: flex;
            align-items: center;
            gap: 8px;
            min-height: 34px;
            padding: 8px 10px;
            border-radius: 8px;
            color: #374151;
            font-size: 13px;
            font-weight: 750;
        }
        .ops-nav-link:hover, .ops-nav-link.active { background: var(--surface-soft); color: var(--text); }
        .ops-nav-dot { width: 7px; height: 7px; border-radius: 999px; background: var(--primary); }
        .ops-sidebar-menu { position: relative; }
        .ops-nav-link.has-menu { width: 100%; border: 0; background: transparent; cursor: default; }
        .ops-nav-caret { margin-right: auto; color: var(--muted); font-size: 11px; }
        .ops-sidebar-dropdown {
            position: absolute;
            inset-inline-start: 100%;
            top: 0;
            z-index: 40;
            width: 248px;
            max-height: 420px;
            overflow: auto;
            padding: 8px;
            border: 1px solid var(--line);
            border-radius: 12px;
            background: var(--surface);
            box-shadow: 0 18px 45px rgba(17, 24, 39, .12);
            opacity: 0;
            transform: translateX(-6px);
            pointer-events: none;
            transition: opacity .14s ease, transform .14s ease;
        }
        .ops-sidebar-menu:hover .ops-sidebar-dropdown, .ops-sidebar-menu:focus-within .ops-sidebar-dropdown { opacity: 1; transform: translateX(0); pointer-events: auto; }
        .ops-run-option { display: grid; gap: 4px; padding: 9px 10px; border-radius: 9px; color: var(--text); }
        .ops-run-option:hover, .ops-run-option.active { background: var(--surface-soft); }
        .ops-run-option.active { box-shadow: inset 3px 0 0 var(--primary); }
        .ops-run-option-title { display: flex; align-items: center; justify-content: space-between; gap: 8px; font-weight: 850; font-size: 12px; }
        .ops-run-option-meta { display: flex; align-items: center; justify-content: space-between; gap: 8px; color: var(--muted); font-size: 11px; }
        .ops-page-menu { min-height: 44px; margin-bottom: 10px; padding: 7px 9px; display: flex; align-items: center; justify-content: space-between; gap: 10px; border: 1px solid var(--line); border-radius: 13px; background: var(--surface); }
        .ops-page-menu-items { display: flex; align-items: center; gap: 6px; }
        .ops-page-menu-item { min-height: 28px; padding: 6px 10px; border-radius: 8px; color: #374151; font-size: 12px; font-weight: 800; }
        .ops-page-menu-item.active, .ops-page-menu-item:hover { background: var(--surface-soft); color: var(--text); }
        .ops-main { min-width: 0; padding: 14px 16px 16px; }

        .messages { display: grid; gap: 8px; margin-bottom: 10px; }
        .message { padding: 10px 12px; border-radius: 10px; background: var(--primary-soft); color: var(--primary-dark); border: 1px solid #fed7c2; font-size: 12px; line-height: 1.7; }
        .message.error { background: var(--danger-soft); color: var(--danger); border-color: #fecaca; }
        .message.success { background: var(--success-soft); color: var(--success); border-color: #bbf7d0; }
        .message.warning { background: var(--warning-soft); color: var(--warning); border-color: #fde68a; }

        h1, h2, h3 { margin: 0; color: var(--text); }
        .muted { color: var(--muted); font-size: 12px; line-height: 1.7; }
        .tiny-link { color: var(--muted); font-size: 11px; }
        .tiny-link:hover { color: var(--primary-dark); }

        .btn {
            border: 1px solid transparent;
            border-radius: 8px;
            padding: 7px 10px;
            background: var(--primary);
            color: #fff;
            font-size: 12px;
            font-weight: 800;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            min-height: 32px;
            white-space: nowrap;
        }
        .btn:hover { background: var(--primary-dark); color: #fff; }
        .btn.secondary, .btn.ghost { background: var(--surface); color: #374151; border-color: var(--line); }
        .btn.secondary:hover, .btn.ghost:hover { background: var(--surface-soft); color: var(--text); border-color: var(--line-strong); }
        .btn.danger { background: var(--danger); color: #fff; border-color: var(--danger); }
        .btn[disabled], .btn.disabled { opacity: .55; cursor: not-allowed; }
        .row-action { min-height: 26px; padding: 4px 8px; border-radius: 7px; font-size: 11px; }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 7px;
            border-radius: 999px;
            background: var(--primary-soft);
            color: var(--primary-dark);
            border: 1px solid #fed7c2;
            font-size: 11px;
            font-weight: 800;
            line-height: 1.4;
            white-space: nowrap;
        }
        .badge.pending { background: var(--warning-soft); color: var(--warning); border-color: #fde68a; }
        .badge.error { background: var(--danger-soft); color: var(--danger); border-color: #fecaca; }
        .badge.ok { background: var(--success-soft); color: var(--success); border-color: #bbf7d0; }
        .badge.gray { background: #f3f4f6; color: #4b5563; border-color: var(--line); }
        .badge.info { background: var(--info-soft); color: var(--info); border-color: #bfdbfe; }
        .badge.warning { background: var(--warning-soft); color: var(--warning); border-color: #fde68a; }

        .ops-workspace { display: grid; grid-template-rows: auto auto auto minmax(0, 1fr); gap: 10px; min-height: calc(100vh - 30px); }
        .ops-dashboard-grid {
            direction: ltr;
            display: grid;
            grid-template-columns: minmax(0, 1fr) clamp(220px, 19vw, 280px);
            gap: 10px;
            min-height: calc(100vh - 30px);
            align-items: stretch;
        }
        .ops-center, .ops-support-panel { direction: rtl; min-width: 0; }
        .ops-center { display: grid; grid-template-rows: auto auto auto minmax(0, 1fr); gap: 10px; }
        .ops-support-panel { display: grid; align-content: start; gap: 10px; }
        .support-card {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 12px;
        }
        .support-card h2 { margin-top: 6px; font-size: 17px; line-height: 1.5; }
        .support-kicker { color: var(--muted); font-size: 11px; font-weight: 850; letter-spacing: .02em; text-transform: uppercase; }
        .support-list { display: grid; gap: 8px; margin-top: 12px; }
        .support-list-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; color: var(--muted); font-size: 12px; }
        .support-list-row strong { color: var(--text); font-size: 13px; }
        .support-link { display: flex; align-items: center; justify-content: space-between; gap: 8px; min-height: 34px; padding: 8px 10px; border: 1px solid var(--line); border-radius: 9px; color: var(--text); font-size: 12px; font-weight: 800; }
        .support-link:hover { background: var(--surface-soft); border-color: var(--line-strong); }
        .ops-topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 2px 2px 0;
        }
        .ops-title { display: flex; align-items: center; gap: 10px; min-width: 0; }
        .ops-title h1 { font-size: 18px; line-height: 1.5; letter-spacing: -.2px; }
        .ops-title-meta { color: var(--muted); font-size: 12px; white-space: nowrap; }
        .ops-topbar-actions { display: flex; flex-wrap: wrap; justify-content: flex-end; gap: 7px; }
        .ops-toolbar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px;
            border: 1px solid var(--line);
            border-radius: 12px;
            background: var(--surface);
        }
        .toolbar-search { flex: 1 1 340px; min-width: 240px; }
        .inline-field, select {
            width: 100%;
            min-width: 138px;
            height: 34px;
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 7px 10px;
            background: #fff;
            color: var(--text);
            outline: none;
            font-size: 12px;
        }
        .inline-field:focus, select:focus { border-color: #f59b75; box-shadow: 0 0 0 3px rgba(233, 83, 29, .08); }
        .analysis-progress {
            display: flex;
            align-items: center;
            min-height: 30px;
            padding: 6px 10px;
            border-radius: 9px;
            border: 1px solid var(--line);
            background: #fff;
            color: var(--muted);
            font-size: 12px;
            line-height: 1.7;
        }
        .analysis-progress strong { color: var(--primary-dark); }

        .product-table-panel {
            min-height: calc(100vh - 178px);
            max-height: calc(100vh - 178px);
            overflow: auto;
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 12px;
        }
        table { width: 100%; border-collapse: separate; border-spacing: 0; }
        .product-data-table { min-width: 1080px; }
        th, td { text-align: right; vertical-align: middle; }
        .product-data-table th {
            position: sticky;
            top: 0;
            z-index: 2;
            padding: 8px 10px;
            background: #f9fafb;
            color: var(--muted);
            border-bottom: 1px solid var(--line);
            font-size: 11px;
            font-weight: 850;
            white-space: nowrap;
        }
        .product-data-table td {
            padding: 7px 10px;
            border-bottom: 1px solid var(--line);
            font-size: 12px;
        }
        .product-data-table tr:hover td { background: #fcfcfd; }
        .col-image { width: 58px; }
        .col-title { width: 34%; }
        .col-price, .col-discount, .col-time { white-space: nowrap; }
        .product-thumb, .product-thumb-placeholder {
            width: 42px;
            height: 42px;
            border-radius: 8px;
            border: 1px solid var(--line);
            background: var(--surface-soft);
            object-fit: cover;
        }
        .product-thumb-placeholder { display: grid; place-items: center; color: var(--muted); font-size: 10px; font-weight: 800; }
        .product-title { color: var(--text); font-weight: 850; line-height: 1.55; }
        .product-title:hover { color: var(--primary-dark); }
        .row-meta { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 3px; color: var(--muted); font-size: 11px; }
        .vendor-cell { display: grid; gap: 2px; min-width: 120px; }
        .vendor-name { font-weight: 750; color: #374151; }
        .price-main { color: var(--text); font-weight: 850; white-space: nowrap; }
        .price-offer { color: var(--primary-dark); font-weight: 900; white-space: nowrap; }
        .primary-price { color: var(--muted-soft); text-decoration: line-through; white-space: nowrap; }
        .discount-pill { color: var(--success); font-weight: 900; white-space: nowrap; }
        .status-cell { display: grid; gap: 5px; min-width: 150px; }
        .status-line { display: flex; flex-wrap: wrap; align-items: center; gap: 5px; }
        .result-links { display: flex; flex-wrap: wrap; gap: 4px; }
        .result-link { display: inline-flex; align-items: center; justify-content: center; min-height: 22px; padding: 3px 7px; border-radius: 7px; background: var(--primary-soft); color: var(--primary-dark); border: 1px solid #fed7c2; font-size: 11px; font-weight: 800; }
        .accepted-count { color: var(--muted); font-size: 11px; }
        .time-cell { color: #374151; white-space: nowrap; }
        .empty-card { padding: 28px; text-align: center; color: var(--muted); }

        .pdp-shell { display: grid; grid-template-columns: minmax(260px, 340px) minmax(0, 1fr) minmax(240px, 300px); gap: 14px; align-items: start; }
        .pdp-gallery, .pdp-info, .pdp-buybox, .history-card, .analysis-log-item { background: var(--surface); border: 1px solid var(--line); border-radius: 12px; padding: 14px; }
        .pdp-image, .pdp-placeholder { width: 100%; aspect-ratio: 1 / 1; border-radius: 10px; object-fit: cover; background: var(--surface-soft); border: 1px solid var(--line); }
        .pdp-placeholder { display: grid; place-items: center; color: var(--muted); }
        .pdp-title { font-size: 20px; line-height: 1.7; }
        .meta-row, .similar-results, .status-stack { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 10px; }
        .buybox-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--line); }
        .buybox-row:last-child { border-bottom: 0; }
        .metric-label, .price-label { color: var(--muted); font-size: 11px; font-weight: 750; }
        .offer-price { color: var(--primary-dark); font-weight: 900; white-space: nowrap; }
        .error-note, .process-note, .debug-note { margin-top: 8px; padding: 8px 10px; border-radius: 9px; border: 1px solid var(--line); background: var(--surface-soft); color: var(--muted); font-size: 12px; line-height: 1.7; }
        .error-note { border-color: #fecaca; background: var(--danger-soft); color: var(--danger); }
        .analysis-log-list, .history-list { display: grid; gap: 8px; margin-top: 10px; }
        .history-card { display: grid; grid-template-columns: minmax(140px, .7fr) minmax(0, 1fr) minmax(160px, .7fr) minmax(160px, .7fr); gap: 10px; align-items: center; }
        .section-title { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin: 18px 0 10px; }
        .section-title h2 { font-size: 16px; }
        .section-kicker, .hero-eyebrow { color: var(--primary-dark); font-size: 11px; font-weight: 850; }

        @media (max-width: 1180px) {
            .ops-dashboard-grid { direction: rtl; grid-template-columns: 1fr; }
            .ops-support-panel { grid-template-columns: repeat(3, minmax(0, 1fr)); }
        }
        @media (max-width: 980px) {
            .ops-shell { grid-template-columns: 1fr; }
            .ops-sidebar { position: static; height: auto; border-left: 0; border-bottom: 1px solid var(--line); display: flex; align-items: center; justify-content: space-between; gap: 12px; }
            .ops-nav { display: flex; }
            .ops-toolbar { flex-wrap: wrap; }
            .ops-support-panel { grid-template-columns: 1fr; }
            .toolbar-search { flex-basis: 100%; }
            .product-table-panel { min-height: calc(100vh - 260px); max-height: none; }
            .pdp-shell { grid-template-columns: 1fr; }
            .history-card { grid-template-columns: 1fr 1fr; }
        }
        @media (max-width: 640px) {
            .ops-main { padding: 10px; }
            .ops-topbar { align-items: flex-start; flex-direction: column; }
            .ops-topbar-actions { justify-content: flex-start; }
            .history-card { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="ops-shell">
    {% block sidebar %}
        <aside class="ops-sidebar" aria-label="Salam Offer navigation">
            <a class="ops-brand" href="{% url 'daily_off:dashboard' %}">
                <span class="ops-brand-mark">%</span>
                <span class="ops-brand-title">Salam Offer</span>
            </a>
            <nav class="ops-nav">
                <a class="ops-nav-link active" href="{% url 'daily_off:dashboard' %}"><span class="ops-nav-dot"></span>خانه</a>
            </nav>
        </aside>
    {% endblock %}
    <main class="ops-main">
        {% if messages %}
            <div class="messages">
                {% for message in messages %}
                    <div class="message {{ message.tags }}">{{ message }}</div>
                {% endfor %}
            </div>
        {% endif %}
        {% block content %}{% endblock %}
    </main>
</div>
</body>
</html>
