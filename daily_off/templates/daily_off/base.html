{% load jalali %}
<!doctype html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Salam Offer{% endblock %}</title>
    <style>
        :root {
            --bg: #f7f6f4;
            --bg-strong: #f0eeeb;
            --card: #ffffff;
            --card-solid: #ffffff;
            --text: #26211d;
            --muted: #7a726d;
            --line: #ebe5df;
            --primary: #e64a19;
            --primary-dark: #c73e14;
            --accent: #ff7a1a;
            --accent-soft: #fff3ed;
            --danger: #d32f2f;
            --warning: #f59e0b;
            --success: #2e7d32;
            --shadow: 0 10px 28px rgba(40, 28, 20, .08);
            --shadow-soft: 0 4px 14px rgba(40, 28, 20, .06);
            --radius: 16px;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: Tahoma, Arial, sans-serif;
            background: linear-gradient(180deg, #ffffff 0, var(--bg) 230px), var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        body::before { display: none; }
        a { color: var(--primary); text-decoration: none; transition: .18s ease; }
        a:hover { color: var(--primary-dark); }
        .topbar {
            position: sticky;
            top: 0;
            z-index: 20;
            color: var(--text);
            padding: 12px 24px;
            border-bottom: 1px solid var(--line);
            background: rgba(255, 255, 255, .96);
            box-shadow: 0 2px 10px rgba(40, 28, 20, .04);
            backdrop-filter: blur(10px);
        }
        .topbar-inner { max-width: 1440px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; gap: 18px; }
        .brand { display: flex; align-items: center; gap: 12px; color: var(--text); }
        .brand:hover { color: var(--primary); }
        .brand-mark {
            width: 42px;
            height: 42px;
            display: grid;
            place-items: center;
            border-radius: 14px;
            background: var(--primary);
            color: white;
            border: none;
            box-shadow: none;
            font-size: 22px;
            font-weight: 950;
        }
        .brand-title { display: block; font-weight: 950; font-size: 22px; letter-spacing: -.4px; direction: ltr; text-align: right; color: var(--text); }
        .brand-subtitle { display: block; color: var(--muted); font-size: 12px; margin-top: 4px; }
        .top-meta {
            color: var(--muted);
            font-size: 12px;
            padding: 7px 11px;
            border-radius: 999px;
            background: #faf9f8;
            border: 1px solid var(--line);
        }
        main { position: relative; padding: 24px 20px 48px; max-width: 1440px; margin: 0 auto; }
        .page-head { display: flex; justify-content: space-between; gap: 16px; align-items: flex-end; margin-bottom: 18px; }
        h1 { margin: 0; font-size: 26px; letter-spacing: -.6px; color: #2b2521; }
        h2 { margin: 24px 0 12px; font-size: 18px; color: #2b2521; }
        .muted { color: var(--muted); font-size: 13px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); gap: 14px; margin-bottom: 22px; }
        .card {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            padding: 16px;
            box-shadow: var(--shadow-soft);
            backdrop-filter: none;
            transition: border-color .18s ease, box-shadow .18s ease;
        }
        .card:hover { box-shadow: var(--shadow-soft); border-color: #f2c7b8; }
        .metric-label { color: var(--muted); font-size: 12px; font-weight: 800; }
        .metric { font-size: 28px; font-weight: 950; margin-top: 8px; color: var(--primary); letter-spacing: -.6px; }
        .table-card { background: var(--card); border-radius: 18px; overflow: hidden; box-shadow: var(--shadow-soft); border: 1px solid var(--line); backdrop-filter: none; }
        table { width: 100%; border-collapse: collapse; background: transparent; }
        th, td { padding: 12px 14px; border-bottom: 1px solid var(--line); text-align: right; vertical-align: middle; }
        th { background: #faf8f6; color: #5f4b42; font-size: 12px; font-weight: 900; white-space: nowrap; }
        tr:hover td { background: #fff8f4; }
        .badge { display: inline-flex; align-items: center; gap: 5px; padding: 5px 10px; border-radius: 999px; background: var(--accent-soft); color: var(--primary-dark); font-size: 12px; font-weight: 800; white-space: nowrap; border: 1px solid #ffd8c8; }
        .badge.pending { background: #fff7df; color: #9a6500; border-color: #ffe6a3; }
        .badge.error { background: #fff0f0; color: #b42318; border-color: #ffd1d1; }
        .badge.ok { background: #edf8ee; color: #2e7d32; border-color: #cfead2; }
        .badge.gray { background: #f3f3f3; color: #666; border-color: #e5e5e5; }
        .badge.info { background: #fff3ed; color: var(--primary-dark); border-color: #ffd8c8; }
        .badge.warning { background: #fff7ed; color: #c2410c; border-color: #fed7aa; }
        .summary-line { display: flex; flex-wrap: wrap; gap: 8px; color: var(--muted); font-size: 12px; line-height: 1.9; }
        .error-note { margin-top: 8px; color: #b42318; background: #fff0f0; border: 1px solid #ffd1d1; border-radius: 12px; padding: 8px 10px; font-size: 12px; line-height: 1.7; }
        .debug-note { margin-top: 6px; color: var(--muted); font-size: 12px; line-height: 1.8; }
        .inline-field { min-width: 230px; border: 1px solid var(--line); border-radius: 12px; padding: 10px 12px; background: white; color: var(--text); font-family: inherit; outline: none; transition: .18s ease; }
        .inline-field:focus, select:focus { border-color: #f2a68a; box-shadow: 0 0 0 3px rgba(230, 74, 25, .10); }
        .messages { display: grid; gap: 10px; margin-bottom: 18px; }
        .message { padding: 12px 15px; border-radius: 14px; background: #fff3ed; color: var(--primary-dark); border: 1px solid #ffd8c8; font-size: 13px; line-height: 1.8; box-shadow: var(--shadow-soft); }
        .message.error { background: #fff0f0; color: #b42318; border-color: #ffd1d1; }
        .message.success { background: #edf8ee; color: #2e7d32; border-color: #cfead2; }
        .message.warning { background: #fff7df; color: #9a6500; border-color: #ffe6a3; }
        img.product { width: 82px; height: 82px; object-fit: cover; border-radius: 14px; background: #f0efed; box-shadow: none; border: 1px solid var(--line); }
        .product-cell { display: flex; align-items: center; gap: 12px; min-width: 320px; }
        .product-title { font-weight: 900; color: #2b2521; line-height: 1.7; }
        .product-title:hover { color: var(--primary); }
        .tiny-link { color: var(--muted); font-size: 12px; display: inline-block; margin-top: 4px; }
        .tiny-link:hover { color: var(--primary); }
        .offer-price { color: var(--primary); font-size: 17px; font-weight: 950; white-space: nowrap; }
        .primary-price { color: #a8a29e; text-decoration: line-through; white-space: nowrap; }
        .price-label { display: block; color: var(--muted); font-size: 11px; margin-bottom: 3px; }
        .filter-bar { display: flex; flex-wrap: wrap; gap: 10px; align-items: end; padding: 14px; margin-bottom: 18px; border-radius: 18px; background: #ffffff; border: 1px solid var(--line); box-shadow: var(--shadow-soft); backdrop-filter: none; }
        .field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 7px; font-weight: 800; }
        select, button { font-family: inherit; }
        select { min-width: 210px; border: 1px solid var(--line); border-radius: 12px; padding: 10px 12px; background: white; color: var(--text); outline: none; transition: .18s ease; }
        .btn { border: 0; border-radius: 12px; padding: 9px 15px; background: var(--primary); color: white; font-weight: 900; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; min-height: 38px; font-family: inherit; box-shadow: none; transition: background .18s ease, color .18s ease; }
        .btn:hover { color: white; background: var(--primary-dark); box-shadow: none; }
        .btn.secondary { background: #f4f4f3; color: #4b4540; border: 1px solid var(--line); box-shadow: none; }
        .btn.secondary:hover { color: var(--primary); background: #fff8f4; box-shadow: none; }
        .btn.danger { background: var(--danger); color: white; box-shadow: none; }
        .btn.danger:hover { background: #b71c1c; color: white; }
        .result-links { display: flex; flex-direction: column; gap: 7px; min-width: 140px; }
        .result-link { padding: 7px 10px; border-radius: 10px; background: #fff3ed; color: var(--primary-dark); font-size: 12px; font-weight: 900; text-align: center; border: 1px solid #ffd8c8; }
        .result-link:hover { background: var(--primary); color: white; }
        .hero { display: grid; grid-template-columns: 220px 1fr; gap: 24px; align-items: start; }
        .hero img { width: 220px; height: 220px; border-radius: 18px; object-fit: cover; box-shadow: none; background: #f0efed; border: 1px solid var(--line); }
        .hero-title { font-size: 24px; font-weight: 950; margin-bottom: 12px; line-height: 1.7; color: #2b2521; }
        .meta-row { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 12px; }
        @media (max-width: 760px) {
            .topbar-inner, .page-head { align-items: flex-start; flex-direction: column; }
            .topbar { padding: 12px 16px; }
            main { padding: 18px 12px 36px; }
            .table-card { overflow-x: auto; }
            .hero { grid-template-columns: 1fr; }
            .hero img { width: 100%; height: 260px; }
            .product-cell { min-width: 280px; }
        }
    </style>
</head>
<body>
<header class="topbar">
    <div class="topbar-inner">
        <a class="brand" href="{% url 'daily_off:dashboard' %}">
            <span class="brand-mark">%</span>
            <span>
                <span class="brand-title">Salam Offer</span>
                <span class="brand-subtitle">پایش آفرهای باسلام و مقایسه قیمت</span>
            </span>
        </a>
        <div class="top-meta">امروز: {% now "Y-m-d" %}</div>
    </div>
</header>
<main>
    {% if messages %}
        <div class="messages">
            {% for message in messages %}
                <div class="message {{ message.tags }}">{{ message }}</div>
            {% endfor %}
        </div>
    {% endif %}
    {% block content %}{% endblock %}
</main>
</body>
</html>
