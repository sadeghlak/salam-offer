{% load jalali %}
<!doctype html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Salam Offer{% endblock %}</title>
    <style>
        :root {
            --bg: #f5f7fb;
            --bg-strong: #e8eef8;
            --card: rgba(255, 255, 255, .86);
            --card-solid: #ffffff;
            --text: #111827;
            --muted: #64748b;
            --line: rgba(148, 163, 184, .22);
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --accent: #06b6d4;
            --violet: #7c3aed;
            --danger: #ef4444;
            --warning: #f59e0b;
            --success: #16a34a;
            --shadow: 0 24px 70px rgba(15, 23, 42, .10);
            --shadow-soft: 0 12px 36px rgba(15, 23, 42, .07);
            --radius: 24px;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: Tahoma, Arial, sans-serif;
            background:
                radial-gradient(circle at top right, rgba(37, 99, 235, .18), transparent 34rem),
                radial-gradient(circle at 14% 12%, rgba(6, 182, 212, .15), transparent 28rem),
                radial-gradient(circle at 45% 0%, rgba(124, 58, 237, .11), transparent 26rem),
                linear-gradient(135deg, #fbfdff 0%, var(--bg) 48%, var(--bg-strong) 100%);
            color: var(--text);
            min-height: 100vh;
        }
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image: linear-gradient(rgba(15, 23, 42, .035) 1px, transparent 1px), linear-gradient(90deg, rgba(15, 23, 42, .035) 1px, transparent 1px);
            background-size: 48px 48px;
            mask-image: linear-gradient(to bottom, rgba(0,0,0,.55), transparent 72%);
        }
        a { color: var(--primary); text-decoration: none; transition: .18s ease; }
        a:hover { color: var(--primary-dark); }
        .topbar {
            position: sticky;
            top: 0;
            z-index: 20;
            color: white;
            padding: 18px 28px;
            border-bottom: 1px solid rgba(255, 255, 255, .16);
            background:
                linear-gradient(135deg, rgba(15, 23, 42, .94), rgba(30, 64, 175, .92) 48%, rgba(8, 145, 178, .90)),
                radial-gradient(circle at top right, rgba(255,255,255,.24), transparent 26rem);
            box-shadow: 0 18px 50px rgba(15, 23, 42, .18);
            backdrop-filter: blur(18px);
        }
        .topbar-inner { max-width: 1440px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; gap: 20px; }
        .brand { display: flex; align-items: center; gap: 14px; color: white; }
        .brand:hover { color: white; transform: translateY(-1px); }
        .brand-mark {
            width: 52px;
            height: 52px;
            display: grid;
            place-items: center;
            border-radius: 18px;
            background: linear-gradient(135deg, rgba(255,255,255,.22), rgba(255,255,255,.08));
            border: 1px solid rgba(255,255,255,.22);
            box-shadow: inset 0 1px 0 rgba(255,255,255,.25), 0 12px 30px rgba(0,0,0,.16);
            font-size: 24px;
            font-weight: 900;
        }
        .brand-title { display: block; font-weight: 950; font-size: 25px; letter-spacing: -.4px; direction: ltr; text-align: right; }
        .brand-subtitle { display: block; color: #dbeafe; font-size: 13px; margin-top: 5px; }
        .top-meta {
            color: #e0f2fe;
            font-size: 13px;
            padding: 9px 13px;
            border-radius: 999px;
            background: rgba(255,255,255,.12);
            border: 1px solid rgba(255,255,255,.16);
        }
        main { position: relative; padding: 34px 22px 56px; max-width: 1440px; margin: 0 auto; }
        .page-head { display: flex; justify-content: space-between; gap: 16px; align-items: flex-end; margin-bottom: 24px; }
        h1 { margin: 0; font-size: 30px; letter-spacing: -.7px; color: #0f172a; }
        h2 { margin: 30px 0 15px; font-size: 20px; color: #0f172a; }
        .muted { color: var(--muted); font-size: 13px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); gap: 16px; margin-bottom: 26px; }
        .card {
            background: var(--card);
            border: 1px solid rgba(255,255,255,.75);
            border-radius: var(--radius);
            padding: 21px;
            box-shadow: var(--shadow-soft);
            backdrop-filter: blur(14px);
            transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
        }
        .card:hover { transform: translateY(-2px); box-shadow: var(--shadow); border-color: rgba(37, 99, 235, .18); }
        .metric-label { color: var(--muted); font-size: 12px; font-weight: 700; }
        .metric { font-size: 31px; font-weight: 950; margin-top: 10px; color: #1e3a8a; letter-spacing: -.6px; }
        .table-card { background: var(--card); border-radius: 28px; overflow: hidden; box-shadow: var(--shadow); border: 1px solid rgba(255,255,255,.78); backdrop-filter: blur(14px); }
        table { width: 100%; border-collapse: collapse; background: transparent; }
        th, td { padding: 15px 16px; border-bottom: 1px solid var(--line); text-align: right; vertical-align: middle; }
        th { background: linear-gradient(180deg, rgba(248,250,252,.95), rgba(239,246,255,.92)); color: #1e3a8a; font-size: 12px; font-weight: 900; white-space: nowrap; }
        tr:hover td { background: rgba(37, 99, 235, .045); }
        .badge { display: inline-flex; align-items: center; gap: 5px; padding: 6px 11px; border-radius: 999px; background: #e0f2fe; color: #075985; font-size: 12px; font-weight: 800; white-space: nowrap; border: 1px solid rgba(14,116,144,.10); }
        .badge.pending { background: #fef3c7; color: #92400e; }
        .badge.error { background: #fee2e2; color: #991b1b; }
        .badge.ok { background: #dcfce7; color: #166534; }
        .badge.gray { background: #f1f5f9; color: #475569; }
        .badge.info { background: #dbeafe; color: #1d4ed8; }
        .badge.warning { background: #ffedd5; color: #c2410c; }
        .summary-line { display: flex; flex-wrap: wrap; gap: 8px; color: var(--muted); font-size: 12px; line-height: 1.9; }
        .error-note { margin-top: 8px; color: #991b1b; background: #fee2e2; border-radius: 14px; padding: 8px 10px; font-size: 12px; line-height: 1.7; }
        .debug-note { margin-top: 6px; color: var(--muted); font-size: 12px; line-height: 1.8; }
        .inline-field { min-width: 230px; border: 1px solid var(--line); border-radius: 16px; padding: 11px 13px; background: white; color: var(--text); font-family: inherit; outline: none; transition: .18s ease; }
        .inline-field:focus, select:focus { border-color: rgba(37, 99, 235, .55); box-shadow: 0 0 0 4px rgba(37, 99, 235, .10); }
        .messages { display: grid; gap: 10px; margin-bottom: 18px; }
        .message { padding: 13px 16px; border-radius: 18px; background: #e0f2fe; color: #075985; border: 1px solid #bae6fd; font-size: 13px; line-height: 1.8; box-shadow: var(--shadow-soft); }
        .message.error { background: #fee2e2; color: #991b1b; border-color: #fecaca; }
        .message.success { background: #dcfce7; color: #166534; border-color: #bbf7d0; }
        .message.warning { background: #fef3c7; color: #92400e; border-color: #fde68a; }
        img.product { width: 74px; height: 74px; object-fit: cover; border-radius: 20px; background: #e2e8f0; box-shadow: 0 10px 24px rgba(15,23,42,.14); }
        .product-cell { display: flex; align-items: center; gap: 14px; min-width: 320px; }
        .product-title { font-weight: 900; color: #0f172a; line-height: 1.8; }
        .tiny-link { color: var(--muted); font-size: 12px; display: inline-block; margin-top: 5px; }
        .offer-price { color: var(--success); font-size: 18px; font-weight: 950; white-space: nowrap; }
        .primary-price { color: #94a3b8; text-decoration: line-through; white-space: nowrap; }
        .price-label { display: block; color: var(--muted); font-size: 11px; margin-bottom: 3px; }
        .filter-bar { display: flex; flex-wrap: wrap; gap: 12px; align-items: end; padding: 17px; margin-bottom: 18px; border-radius: 24px; background: rgba(255,255,255,.76); border: 1px solid rgba(255,255,255,.78); box-shadow: var(--shadow-soft); backdrop-filter: blur(14px); }
        .field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 7px; font-weight: 800; }
        select, button { font-family: inherit; }
        select { min-width: 210px; border: 1px solid var(--line); border-radius: 16px; padding: 11px 13px; background: white; color: var(--text); outline: none; transition: .18s ease; }
        .btn { border: 0; border-radius: 16px; padding: 10px 17px; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; font-weight: 900; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; min-height: 42px; font-family: inherit; box-shadow: 0 10px 22px rgba(37, 99, 235, .20); transition: transform .18s ease, box-shadow .18s ease, filter .18s ease; }
        .btn:hover { color: white; transform: translateY(-1px); box-shadow: 0 14px 28px rgba(37, 99, 235, .24); filter: saturate(1.04); }
        .btn.secondary { background: #e2e8f0; color: #334155; box-shadow: none; }
        .btn.secondary:hover { color: #0f172a; box-shadow: 0 10px 22px rgba(15, 23, 42, .10); }
        .btn.danger { background: linear-gradient(135deg, #ef4444, #dc2626); color: white; box-shadow: 0 10px 22px rgba(239, 68, 68, .20); }
        .result-links { display: flex; flex-direction: column; gap: 7px; min-width: 140px; }
        .result-link { padding: 7px 10px; border-radius: 12px; background: linear-gradient(135deg, #ecfeff, #eff6ff); color: #0e7490; font-size: 12px; font-weight: 900; text-align: center; border: 1px solid #cffafe; }
        .hero { display: grid; grid-template-columns: 190px 1fr; gap: 26px; align-items: center; }
        .hero img { width: 190px; height: 190px; border-radius: 34px; object-fit: cover; box-shadow: var(--shadow); background: #e2e8f0; }
        .hero-title { font-size: 27px; font-weight: 950; margin-bottom: 14px; line-height: 1.7; color: #0f172a; }
        .meta-row { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 12px; }
        @media (max-width: 760px) {
            .topbar-inner, .page-head { align-items: flex-start; flex-direction: column; }
            .topbar { padding: 16px; }
            main { padding: 22px 12px 40px; }
            .table-card { overflow-x: auto; }
            .hero { grid-template-columns: 1fr; }
            .hero img { width: 100%; height: 250px; }
        }
    </style>
</head>
<body>
<header class="topbar">
    <div class="topbar-inner">
        <a class="brand" href="{% url 'daily_off:dashboard' %}">
            <span class="brand-mark">%</span>
            <span>
                <span class="brand-title">Salam Offer</span>
                <span class="brand-subtitle">داشبورد محصولات دیلی‌آف و تحلیل قیمت</span>
            </span>
        </a>
        <div class="top-meta">امروز: {% now "Y-m-d" %}</div>
    </div>
</header>
<main>
    {% if messages %}
        <div class="messages">
            {% for message in messages %}
                <div class="message {{ message.tags }}">{{ message }}</div>
            {% endfor %}
        </div>
    {% endif %}
    {% block content %}{% endblock %}
</main>
</body>
</html>
